# fly.toml app configuration file generated for whatsappbot on 2026-06-03T14:14:44Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'whatsappbot'
primary_region = 'lhr'

[build]

[[mounts]]
  source = 'whatsapp_data'
  destination = '/data'

[[services]]
  internal_port = 8080
  protocol = "tcp"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
